<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Animation for Edlawit</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #00051a; /* ከቪዲዮው ጋር ተመሳሳይ ጥቁር ሰማያዊ */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="heartCanvas"></canvas>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const words = [];
    const wordText = "i love you";
    const centerName = "EDLAWIT";
    const totalWords = 150;

    // የልብ ቅርጽ ቀመር (Heart Formula)
    function getHeartPoint(t) {
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        return { x: x * 15, y: y * 15 };
    }

    class Word {
        constructor(index) {
            this.index = index;
            this.reset();
        }

        reset() {
            this.t = (this.index / totalWords) * Math.PI * 2;
            this.speed = 0.02 + Math.random() * 0.02;
            this.size = 10 + Math.random() * 8;
            this.opacity = 0.4 + Math.random() * 0.6;
        }

        update() {
            this.t += this.speed; // ወደ ቀኝ እንዲሮጡ የሚያደርግ እንቅስቃሴ
        }

        draw() {
            const pos = getHeartPoint(this.t);
            ctx.font = `${this.size}px Arial`;
            ctx.fillStyle = `rgba(255, 105, 180, ${this.opacity})`; // ሮዝ/ቀይ ቀለም
            ctx.fillText(wordText, canvas.width / 2 + pos.x, canvas.height / 2 + pos.y);
        }
    }

    for (let i = 0; i < totalWords; i++) {
        words.push(new Word(i));
    }

    function animate() {
        ctx.fillStyle = 'rgba(0, 5, 26, 0.2)'; // የጥላ ውጤት (Tail effect)
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // መሃል ላይ ያለውን ስም መሳል
        ctx.font = "bold 50px 'Segoe UI', Arial";
        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "center";
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#ff0080";
        ctx.fillText(centerName, canvas.width / 2, canvas.height / 2 + 15);
        ctx.shadowBlur = 0;

        words.forEach(word => {
            word.update();
            word.draw();
        });

        requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>
</body>
</html>
